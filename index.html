<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMSC 471 — Final Exam Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --surface2:#1a2235; --border:#1e2d4a;
  --accent:#3b82f6; --accent2:#60a5fa; --gold:#f59e0b; --green:#10b981;
  --red:#ef4444; --purple:#8b5cf6; --text:#e2e8f0; --muted:#64748b; --code:#0d1117;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.7;min-height:100vh}
header{background:linear-gradient(135deg,#0f172a 0%,#0a1628 100%);border-bottom:1px solid var(--border);padding:24px 40px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:100}
.logo-mark{width:38px;height:38px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;box-shadow:0 0 18px rgba(59,130,246,.4)}
header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.5px;color:#fff}
header p{font-size:12px;color:var(--muted);margin-top:1px}
.container{display:flex;min-height:calc(100vh - 83px)}
nav{width:235px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;position:sticky;top:83px;height:calc(100vh - 83px);overflow-y:auto}
nav::-webkit-scrollbar{width:3px}
nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.nav-group-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:14px 18px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:13px;color:var(--muted);border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:rgba(59,130,246,.05)}
.nav-item.active{color:var(--accent2);border-left-color:var(--accent);background:rgba(59,130,246,.08);font-weight:500}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .15s}
.nav-item.active .nav-dot{background:var(--accent);box-shadow:0 0 5px var(--accent)}
main{flex:1;padding:38px 46px;overflow-y:auto;max-width:920px}
.topic{display:none}
.topic.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.topic-header{margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.topic-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:2px 9px;border-radius:3px;margin-bottom:9px}
.tag-logic{background:rgba(139,92,246,.15);color:#a78bfa}
.tag-prob{background:rgba(16,185,129,.15);color:#34d399}
.tag-ml{background:rgba(245,158,11,.15);color:#fbbf24}
.tag-plan{background:rgba(59,130,246,.15);color:#60a5fa}
.tag-rl{background:rgba(239,68,68,.15);color:#f87171}
.tag-nn{background:rgba(236,72,153,.15);color:#f472b6}
.tag-review{background:rgba(100,116,139,.15);color:#94a3b8}
.topic-header h2{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;letter-spacing:-1px;color:#fff;line-height:1.1;margin-bottom:6px}
.topic-header p{color:var(--muted);font-size:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:22px;margin-bottom:18px}
.card h3{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card h3 .icon{font-size:17px}
.card p{color:#94a3b8;margin-bottom:9px}
.card p:last-child{margin-bottom:0}
.card ul,.card ol{padding-left:18px;color:#94a3b8}
.card li{margin-bottom:4px}
strong{color:var(--text);font-weight:600}
.formula{background:var(--code);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:7px;padding:13px 16px;font-family:'Space Mono',monospace;font-size:12.5px;color:#93c5fd;margin:11px 0;overflow-x:auto;line-height:1.9;white-space:pre}
.highlight-box{background:var(--code);border:2px solid var(--gold);border-radius:7px;padding:13px 16px;font-family:'Space Mono',monospace;font-size:12.5px;color:#fde68a;margin:11px 0;line-height:1.9;white-space:pre}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:18px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:18px}
@media(max-width:680px){.two-col,.three-col{grid-template-columns:1fr}}
.example{background:var(--surface2);border:1px solid var(--border);border-radius:9px;margin-bottom:14px;overflow:hidden}
.example-header{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;cursor:pointer;background:rgba(59,130,246,.04);border-bottom:1px solid transparent;transition:background .15s;user-select:none}
.example-header:hover{background:rgba(59,130,246,.09)}
.example-header.open{border-bottom-color:var(--border)}
.example-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13.5px;color:#93c5fd;display:flex;align-items:center;gap:7px}
.ex-badge{font-size:10px;padding:2px 7px;border-radius:3px;font-family:'Space Mono',monospace;background:rgba(59,130,246,.18);color:var(--accent2);font-weight:400}
.ex-badge-gold{font-size:10px;padding:2px 7px;border-radius:3px;font-family:'Space Mono',monospace;background:rgba(245,158,11,.2);color:#fbbf24;font-weight:700}
.example-toggle{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;transition:transform .2s}
.example-header.open .example-toggle{transform:rotate(180deg)}
.example-body{padding:17px;display:none}
.example-body.open{display:block}
.problem-label,.solution-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.problem-label{color:var(--muted)}
.solution-label{color:var(--green);margin-top:13px;padding-top:13px;border-top:1px solid var(--border)}
.problem-text{color:var(--text);margin-bottom:12px;font-size:14px}
.solution-text{color:#a7f3d0;font-size:14px}
table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
th{background:rgba(59,130,246,.1);color:var(--accent2);font-family:'Space Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;padding:8px 11px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:8px 11px;border-bottom:1px solid rgba(30,45,74,.5);color:#94a3b8;font-family:'Space Mono',monospace;font-size:11.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(59,130,246,.03)}
.info-box{border-radius:7px;padding:12px 16px;margin:11px 0;font-size:13px;display:flex;gap:11px;align-items:flex-start}
.info-box .box-icon{font-size:17px;flex-shrink:0}
.info-box.warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
.info-box.tip{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
.info-box.note{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#93c5fd}
.info-box.exam{background:rgba(245,158,11,.12);border:2px solid rgba(245,158,11,.4);color:#fde68a}
.compare-card{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:14px}
.compare-card h4{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;margin-bottom:9px}
.compare-card ul{color:#94a3b8;padding-left:15px}
.compare-card li{margin-bottom:3px;font-size:13px}
.quiz-container{margin-top:28px}
.quiz-header{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:#fff;margin-bottom:3px}
.quiz-sub{color:var(--muted);font-size:12.5px;margin-bottom:17px}
.quiz-q{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:18px;margin-bottom:13px;transition:border-color .2s}
.quiz-q.answered-correct{border-color:var(--green)}
.quiz-q.answered-wrong{border-color:var(--red)}
.quiz-question{font-weight:500;color:var(--text);margin-bottom:12px;font-size:14px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:7px}
.quiz-option{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;font-size:13px;color:#94a3b8;background:var(--surface2);user-select:none}
.quiz-option:hover{border-color:var(--accent);color:var(--text);background:rgba(59,130,246,.05)}
.quiz-option.selected-correct{border-color:var(--green);background:rgba(16,185,129,.1);color:#a7f3d0}
.quiz-option.selected-wrong{border-color:var(--red);background:rgba(239,68,68,.1);color:#fca5a5}
.quiz-option.reveal-correct{border-color:var(--green);background:rgba(16,185,129,.07)}
.opt-letter{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;width:19px;height:19px;border-radius:3px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.quiz-feedback{font-size:12.5px;margin-top:9px;padding:9px 13px;border-radius:5px;display:none;line-height:1.5}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:rgba(16,185,129,.1);color:#6ee7b7}
.quiz-feedback.wrong{background:rgba(239,68,68,.1);color:#fca5a5}
.quiz-score-bar{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;margin-bottom:18px;font-family:'Space Mono',monospace}
.score-num{font-size:26px;font-weight:700;color:var(--accent2)}
.score-label{font-size:11px;color:var(--muted)}
.quiz-reset-btn{margin-left:auto;background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:5px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:background .15s;letter-spacing:.4px}
.quiz-reset-btn:hover{background:#2563eb}
.table-scroll{overflow-x:auto;margin:10px 0}
.tt td.tt-true{color:#34d399}
.tt td.tt-false{color:#f87171}
main::-webkit-scrollbar{width:5px}
main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
hr{border:none;border-top:1px solid var(--border);margin:18px 0}
/* pipeline diagram */
.pipeline{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:14px 0}
.pipe-box{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 14px;font-size:12px;font-family:'Space Mono',monospace;color:var(--text);text-align:center;flex-shrink:0}
.pipe-box.highlight{border-color:var(--accent);color:var(--accent2);background:rgba(59,130,246,.08)}
.pipe-box.highlight2{border-color:var(--gold);color:#fde68a;background:rgba(245,158,11,.07)}
.pipe-box.highlight3{border-color:var(--green);color:#6ee7b7;background:rgba(16,185,129,.07)}
.pipe-arrow{color:var(--muted);font-size:18px;padding:0 6px;flex-shrink:0}
</style>
</head>
<body>
<header>
  <div class="logo-mark">AI</div>
  <div>
    <h1>CMSC 471 — Final Exam Study Guide</h1>
    <p>Artificial Intelligence · UMBC · Full Coverage Review (v3 — updated with professor notes)</p>
  </div>
</header>
<div class="container">
  <nav id="app-nav"></nav>
  <main id="app-main"></main>
</div>

<script>
/* ================================================================
 * HOW TO EDIT THIS STUDY GUIDE
 * ================================================================
 *
 * ADD A NEW TOPIC:
 *   Push a new object into TOPICS. Required fields:
 *     id, navGroup, navLabel, tagText, tagCls, title, subtitle, quizId, content
 *
 * EDIT CONTENT:
 *   Find the topic by id in TOPICS and edit the `content` HTML string.
 *   CSS classes available in content:
 *     .card, .two-col, .three-col, .compare-card
 *     .formula         — monospace code block (blue)
 *     .highlight-box   — gold border, for "professor said this will be on exam"
 *     .info-box.note / .tip / .warning / .exam
 *     .example         — collapsible worked example
 *     .pipeline        — horizontal arrow diagram (.pipe-box, .pipe-arrow)
 *     table
 *
 * ADD QUIZ QUESTIONS:
 *   Find the array in QUIZ_DATA by quizId and push:
 *   { q:"question", opts:["A","B","C","D"], ans:0, exp:"explanation" }
 *   ans = 0-based index of correct option.
 *
 * RENDERING ENGINE below the data — only touch for layout/behaviour changes.
 * ================================================================ */

// ================================================================
// QUIZ DATA  — one array per topic, keyed by quizId
// ================================================================
const QUIZ_DATA = {

  // ── Propositional Logic ──────────────────────────────────────
  pl: [
    { q:"Modus Ponens says: given P → Q and P is true, what can we conclude?",
      opts:["P is false","Q must be true","Q might be true","Nothing — we need more information"],
      ans:1,
      exp:"Modus Ponens: from (P→Q) and P, derive Q. It is sound but NOT complete on its own — there are true sentences it cannot prove. Resolution is the complete proof procedure." },
    { q:"Why is Modus Ponens alone NOT a complete inference procedure?",
      opts:["It can produce incorrect conclusions","It cannot fire when P is false, missing entailments reachable only through other rules","It requires CNF form","It only works on Horn clauses"],
      ans:1,
      exp:"Modus Ponens cannot handle disjunctive knowledge (OR clauses). For example from 'P OR Q' and 'NOT P' it cannot derive Q without an additional rule. Resolution is needed for completeness." },
    { q:"Soundness of an inference procedure means:",
      opts:["It derives every sentence entailed by the KB","Every rule it derives comes from valid KB entailments (no false conclusions)","It runs in polynomial time","It always terminates"],
      ans:1,
      exp:"Professor's definition: soundness gives you valid rules FROM the KB — every derived sentence is genuinely entailed. Completeness gives you ALL the rules from the KB — no entailed sentence is missed." },
    { q:"To CHECK whether a KB is satisfiable, you need to:",
      opts:["Run a full resolution refutation proof","Add NOT alpha and derive a contradiction","Find at least one truth assignment that satisfies all KB sentences","Prove every sentence in the KB is valid"],
      ans:2,
      exp:"Satisfiability check: just find ONE model (truth assignment) that makes every KB sentence true. If you find one, the KB is satisfiable. Nothing complicated — enumerate assignments and check." }
  ],

  // ── First-Order Logic ────────────────────────────────────────
  fol: [
    { q:"Which sentence correctly means 'Every person has a mother'?",
      opts:["EXISTS y FORALL x person(x) => hasMother(x,y)","FORALL x EXISTS y person(x) => hasMother(x,y)","EXISTS x EXISTS y person(x) AND hasMother(x,y)","FORALL x FORALL y person(x) => hasMother(x,y)"],
      ans:1,
      exp:"FORALL x EXISTS y: for every person x there is some y that is their mother. EXISTS inside FORALL means each person gets their own (possibly different) mother. Flipping gives one shared mother for everyone." },
    { q:"Which is the correct FOL for 'No person can be both male and female'?",
      opts:["FORALL x person(x) => male(x) OR female(x)","NOT EXISTS x person(x) AND male(x) AND female(x)","EXISTS x NOT (person(x) AND male(x) AND female(x))","FORALL x NOT person(x) OR male(x) OR female(x)"],
      ans:1,
      exp:"'No person is both male and female' = there does not exist a person satisfying both properties." },
    { q:"What kind of logic is required to say 'there exists a PROPERTY that all humans share'?",
      opts:["Propositional logic","First-order logic","Higher-order logic","Modal logic"],
      ans:2,
      exp:"Quantifying over predicates/properties requires higher-order logic. FOL only quantifies over individual domain objects." },
    { q:"What is wrong with 'EXISTS x Person(x) IMPLIES Mortal(x)' as 'Some person is mortal'?",
      opts:["The quantifier should be FORALL","The implication is vacuously true even if no persons exist","Mortal should not be a predicate","The sentence is syntactically invalid in FOL"],
      ans:1,
      exp:"With EXISTS, an implication P(x)→Q(x) is true whenever P(x) is false. If nothing satisfies Person(x), the whole sentence is trivially true. Use EXISTS x Person(x) AND Mortal(x)." }
  ],

  // ── Bayesian Reasoning ───────────────────────────────────────
  bayes: [
    { q:"P(A)=0.3, P(B)=0.4, P(A|B)=0.3. Are A and B independent?",
      opts:["No, because P(A) does not equal P(B)","Yes, because P(A|B) = P(A)","No, because neither equals 0.5","Cannot determine without the full joint"],
      ans:1,
      exp:"Independence: P(A|B)=P(A). Here 0.3=0.3 → YES independent. Equivalently P(A,B) = 0.3×0.4 = 0.12 = P(A)×P(B)." },
    { q:"Naive Bayes reduces parameters by assuming:",
      opts:["All classes are equally likely","Features are conditionally independent given the class label","The joint factors into marginals","There are no hidden variables"],
      ans:1,
      exp:"P(f1,...,fn|C) = ∏P(fi|C). Reduces from 2^n parameters to n×k. Main issue: features are rarely truly independent in practice." },
    { q:"P(Disease)=0.01, P(Test+|Disease)=0.95, P(Test+|No Disease)=0.05. P(Disease|Test+) ≈ ?",
      opts:["0.95","0.50","0.16","0.01"],
      ans:2,
      exp:"P(Test+)=0.95×0.01+0.05×0.99=0.059. P(Disease|Test+)=0.0095/0.059≈0.16. Even a 95%-accurate test is mostly false positives when the base rate is 1%!" },
    { q:"Bayes' rule allows you to convert:",
      opts:["Joint to marginal probabilities","P(symptom|cause) to P(cause|symptom)","Independent to dependent variables","Prior to likelihood"],
      ans:1,
      exp:"P(cause|symptom) = P(symptom|cause)×P(cause)/P(symptom). We usually know the likelihood from models and need the posterior for diagnosis." }
  ],

  // ── Bayesian Networks ────────────────────────────────────────
  bbn: [
    { q:"A Bayesian Belief Network must be a:",
      opts:["Directed cyclic graph","Undirected weighted graph","Directed acyclic graph (DAG)","Complete bipartite graph"],
      ans:2,
      exp:"Always a DAG. Directed edges show influence direction. Cycles would create circular probabilistic dependencies making the joint distribution undefined." },
    { q:"In a BBN, a node is conditionally independent of its non-descendants given its:",
      opts:["Children","Parents","Ancestors","Markov blanket"],
      ans:1,
      exp:"The Markov condition: each node Xi is conditionally independent of all non-descendants given its direct parents. This is what makes the factored representation valid." },
    { q:"Variable Elimination computes P(Query | Evidence) by:",
      opts:["Sampling random assignments until convergence","Summing out hidden variables one at a time using factor products","Training a neural network on the CPTs","Running A* over the network"],
      ans:1,
      exp:"VE: restrict factors to evidence, then for each hidden variable multiply all factors involving it and sum it out, creating a smaller factor. Repeat, then normalize." },
    { q:"Which is TRUE about BBNs?",
      opts:["They generally need MORE storage than the full joint","A node can have at most two parents","They encode conditional independence among random variables","Information gain determines network structure"],
      ans:2,
      exp:"BBNs exploit conditional independence to use far LESS storage. Nodes can have any number of parents. Structure comes from domain knowledge, not information gain (that's decision trees)." }
  ],

  // ── ML Foundations ───────────────────────────────────────────
  ml: [
    { q:"The output of logistic regression is computed by applying what to a linear combination of inputs?",
      opts:["ReLU function","Softmax to a single variable","Sigmoid function","Log-normalization"],
      ans:2,
      exp:"Logistic regression: P(y=1|x) = sigmoid(w·x + b) where sigmoid(z)=1/(1+exp(−z)). This squashes any real number into (0,1), giving a probability for binary classification." },
    { q:"Regularization is used in machine learning to:",
      opts:["Increase training accuracy to 100%","Ensure the model does well on both training AND test data","Remove outliers from the training set","Increase the number of model parameters"],
      ans:1,
      exp:"Professor's key point: you want to do well in training AND testing — not achieve 100% training accuracy at the cost of poor test performance. Regularization penalizes model complexity to prevent overfitting." },
    { q:"Which of these is an unsupervised learning task?",
      opts:["Predicting email spam","Grouping customers by purchasing patterns","Estimating house prices","Classifying tumors as malignant or benign"],
      ans:1,
      exp:"Clustering discovers structure without labels — unsupervised. The other three require labeled training examples (supervised)." },
    { q:"Dropout as a regularization technique works by:",
      opts:["Removing training examples that are classified incorrectly","Randomly deactivating neurons during training so the network cannot rely on any single unit","Reducing the learning rate over time","Adding L2 penalties to the loss function"],
      ans:1,
      exp:"Dropout randomly sets a fraction of neuron activations to zero at each training step. This forces the network to learn redundant representations and prevents co-adaptation, reducing overfitting." }
  ],

  // ── Decision Trees ───────────────────────────────────────────
  dt: [
    { q:"ID3 selects the attribute that maximizes:",
      opts:["Accuracy on the training set","Information gain (reduction in entropy)","Number of examples in the majority branch","Tree depth minimization"],
      ans:1,
      exp:"ID3 picks the attribute A maximizing IG(S,A) = H(S) − Σ(|Sv|/|S|)·H(Sv). Greedy choice, efficient but not guaranteed globally optimal." },
    { q:"Entropy of a pure set (all same class) is:",
      opts:["1.0","0.5","0.0","Undefined"],
      ans:2,
      exp:"H = −Σpi·log2(pi). If all examples are one class, p=1, log2(1)=0, so H=0. Maximum entropy = 1.0 for equal 50/50 binary split." },
    { q:"ID3 is guaranteed to find:",
      opts:["The globally smallest consistent decision tree","An optimal tree by test accuracy","A consistent tree but not necessarily the smallest","The tree with minimum training error"],
      ans:2,
      exp:"Finding the globally optimal decision tree is NP-hard. ID3 uses a greedy heuristic and produces a good but not necessarily smallest consistent tree." },
    { q:"Decision trees can be used for:",
      opts:["Binary classification only","Multi-class classification only","Both classification and regression","Unsupervised clustering"],
      ans:2,
      exp:"Decision trees handle multi-class classification AND regression (regression trees for continuous outputs). Not limited to binary." }
  ],

  // ── Neural Networks ──────────────────────────────────────────
  nn: [
    { q:"A neural network layer performs what two operations in sequence?",
      opts:["Convolution then pooling","Dot product (linear combination) then a non-linear activation function","Random sampling then normalization","Backpropagation then forward pass"],
      ans:1,
      exp:"Every layer: z = w·x + b (dot product / linear combination), then output = activation(z). This is exactly logistic regression — stacking many such layers gives a deep network." },
    { q:"A feedforward (fully connected) neural network is primarily used for:",
      opts:["Sequential data like text","Grid-structured data like images","Classification and regression on fixed-size inputs","Generating sequences of variable length"],
      ans:2,
      exp:"Professor's note: feed-forward NNs are for classification (and regression). For sequential data use RNNs; for images use CNNs (with a final FC/MLP layer for classification)." },
    { q:"What is the PRIMARY purpose of a CNN?",
      opts:["Sequential data modelling","Feature extraction from grid-structured input (images)","Text generation","Dimensionality reduction via dropout"],
      ans:1,
      exp:"Professor: CNN's job is feature extraction. It learns hierarchical spatial features (edges → textures → objects). To do classification with CNN output, you attach a fully connected (MLP) layer at the end." },

<div class="info-box exam"><div class="box-icon">⭐</div><div><strong>Professor:</strong> BBN and Bayes Inference is normal exam coverage.</div></div>

<div class="card">
  <h3><span class="icon">🕸️</span>Network Structure</h3>
  <p>A BBN is a <strong>DAG</strong>. Each node is a random variable. Directed edge X→Y means X directly influences Y. Each node has a <strong>CPT</strong> — P(node | parents).</p>
  <p><strong>Markov condition:</strong> every node is conditionally independent of its non-descendants given its parents.</p>
  <div class="info-box note"><div class="box-icon">💡</div><div><strong>Polytree:</strong> at most one undirected path between any two nodes. Allows efficient exact inference. Non-polytrees require more expensive methods.</div></div>
</div>

<div class="card">
  <h3><span class="icon">📉</span>Parameter Savings</h3>
  <div class="formula">Full joint over n binary vars:   2^n - 1 parameters
BBN with sparse parents:         SUM_i 2^|parents(Xi)| parameters

5-variable chain A->B->C->D->E:
  Full joint: 31    BBN: 1+2+2+2+2 = 9  (huge saving!)</div>
</div>

<div class="card">
  <h3><span class="icon">🔢</span>Variable Elimination (VE)</h3>
  <div class="formula">Goal: P(X | evidence e)
1. Start with all CPTs as factors
2. Restrict every factor to observed evidence values
3. For each hidden variable Z (in chosen order):
   a. Collect all factors mentioning Z
   b. Multiply them into one combined factor
   c. Sum Z out -> new smaller factor
4. Multiply remaining factors
5. Normalize to get posterior</div>
</div>

<div class="card">
  <h3><span class="icon">📐</span>MLE Parameter Estimation</h3>
  <div class="formula">P(X=x | parents=p) estimated as:
  count(X=x AND parents=p) / count(parents=p)

<div class="info-box exam"><div class="box-icon">⭐</div><div><strong>Professor:</strong> For the ML unit, know the basic idea. Understand regularization — you want to do well in training AND testing, not 100% training accuracy with very low test accuracy. Dropout is a way to handle overfitting.</div></div>

<div class="two-col">
  <div class="card">
    <h3><span class="icon">🏷️</span>Supervised Learning</h3>
    <p>Training examples have <strong>known labels</strong>.</p>
    <p><strong>Classification</strong> — discrete output (spam/not-spam).</p>
    <p><strong>Regression</strong> — continuous output (house price).</p>
    <p>Examples: Decision Trees, SVM, Neural Networks, Naive Bayes, Logistic Regression.</p>
  </div>
  <div class="card">
    <h3><span class="icon">🔍</span>Unsupervised Learning</h3>
    <p>No labels — discover structure in data.</p>
    <p><strong>Clustering</strong> — group similar instances (K-means).</p>
    <div class="info-box warning" style="margin-top:8px"><div class="box-icon">⚠️</div><div>K-Nearest Neighbors is <em>supervised</em>. K-means is <em>unsupervised</em>.</div></div>
  </div>
</div>

<div class="card">
  <h3><span class="icon">📏</span>Linear Regression — Dot Product Form</h3>
  <div class="highlight-box">Model:      y_hat  =  w^T * x  +  b     (dot product + bias)

Objective:  minimize  SUM_i (yi - y_hat_i)^2    (squared error)

Decision:   Output is a continuous REAL NUMBER (regression, not classification)</div>
  <p>Adding polynomial features (x², x1·x2) allows non-linear fits while keeping the model linear in its parameters.</p>
</div>

<div class="card">
  <h3><span class="icon">📉</span>Logistic Regression — Classification via Sigmoid</h3>
  <div class="highlight-box">Step 1: compute dot product   z  =  w^T * x  +  b   (same as linear regression)
Step 2: apply sigmoid         P(y=1|x)  =  sigmoid(z)  =  1 / (1 + exp(-z))
Step 3: decision              if P >= 0.5 -> class 1;  else -> class 0

sigmoid squashes any real number into (0, 1) -> a probability
This is what "captures a little bit of non-linearity" means.</div>
  <p><strong>MaxEnt (Maximum Entropy)</strong> model arrives at the same formula from an information-theoretic perspective: among all distributions satisfying observed feature statistics, choose the one with maximum entropy (fewest extra assumptions). For classification, MaxEnt = logistic regression.</p>
</div>

<div class="card">
  <h3><span class="icon">🛡️</span>Regularization &amp; Dropout</h3>
  <p>The goal is to do well on <strong>both training and test data</strong> — not 100% training accuracy with very low test accuracy. That is overfitting.</p>
  <div class="two-col" style="margin-top:10px">
    <div class="compare-card">
      <h4>L1 / L2 Regularization</h4>
      <ul>
        <li>Add a penalty term to the loss: λ·||w||</li>
        <li>Discourages large weights</li>
        <li>Keeps the model simpler</li>
        <li>L1 (Lasso): sparse weights — some go to 0</li>
        <li>L2 (Ridge): weights shrink but stay non-zero</li>
      </ul>
    </div>
    <div class="compare-card">
      <h4>Dropout (Neural Networks)</h4>
      <ul>
        <li>Randomly deactivate neurons during training</li>
        <li>Forces network to learn redundant representations</li>
        <li>Prevents neurons from co-adapting</li>
        <li>At test time: all neurons active, weights scaled</li>
        <li>Acts like training an ensemble of smaller networks</li>
      </ul>
    </div>
  </div>
  <div class="info-box exam"><div class="box-icon">⭐</div><div>Regularization will be on the exam. Key idea: you want good generalization (test accuracy), not just fitting the training data. Dropout is one specific way to regularize neural networks.</div></div>
</div>

<div class="card">
  <h3><span class="icon">📈</span>Evaluation: Precision, Recall, Learning Curves</h3>
  <div class="formula">Precision  = TP / (TP + FP)   "of positives I predicted, how many are correct?"
Recall     = TP / (TP + FN)   "of actual positives, how many did I find?"
Accuracy   = (TP + TN) / Total

Learning curve: performance vs. training SET SIZE   (not precision vs. recall!)</div>
</div>`

<div class="card">
  <h3><span class="icon">🧠</span>Neural Networks as Stacked Logistic Regression</h3>
  <p>The professor's key framing: <strong>every layer of an NN does exactly what logistic regression does</strong>. A deep network is stacked logistic regression.</p>
  <div class="highlight-box">Single logistic regression unit:
  z = w^T * x + b          (dot product — linear combination)
  output = sigmoid(z)       (non-linear activation)

Neural network layer (many units):
  z = W * x + b            (matrix dot product)
  output = f(z)             (non-linear activation: ReLU, sigmoid, tanh...)

A deep NN stacks N such layers:  x -> layer1 -> layer2 -> ... -> layerN -> prediction
Each layer does: dot product THEN non-linear function.</div>
  <p><strong>Feedforward NN</strong> (fully connected / MLP) = inputs flow one direction through stacked layers → <strong>used for classification and regression on fixed-size inputs</strong>.</p>
</div>

<div class="two-col">
  <div class="card">
    <h3><span class="icon">🔬</span>CNN — Feature Extraction</h3>
    <p>The <strong>primary purpose of CNN is feature extraction</strong> from grid-structured (spatial) data like images.</p>
    <ul>
      <li>Convolutional filters detect local patterns: edges → textures → shapes → objects</li>
      <li>Shared weights → far fewer parameters than fully connected</li>
      <li>Pooling layers: translation invariance</li>
    </ul>
    <div class="info-box warning" style="margin-top:10px">
      <div class="box-icon">⚠️</div>
      <div><strong>For classification</strong>, you must attach a <strong>Multi-Layer Perceptron (FC layer)</strong> after the CNN. CNN alone does feature extraction; the MLP produces the final class predictions.</div>
    </div>

      -> [MLP/FC layer: classification]
      -> class label</div>
  </div>

    <p>The <strong>primary purpose of RNN is sequential input</strong>: text, speech, time series, video frames.</p>
    <ul>
      <li>Hidden state hₜ = f(hₜ₋₁, xₜ) — memory across steps</li>
      <li>LSTM / GRU: gated variants, handle long-range dependencies</li>
      <li>Can produce sequential output (one output per input step) OR a single summary vector</li>
    </ul>
    <div class="formula">Input sequence:  x1, x2, x3, ...
RNN steps:
  h1 = f(h0, x1)
  h2 = f(h1, x2)

Output: h_final (summary) OR y1, y2, y3 (sequence)</div>
  </div>

  [Image 2] -> CNN -> feature vector f2      (same CNN for all images)
  [Image 3] -> CNN -> feature vector f3

  f1, f2, f3 fed sequentially into RNN/GRU:
    RNN step 1: h1 = GRU(h0, f1)  -> produces sentence/word 1
    RNN step 2: h2 = GRU(h1, f2)  -> produces sentence/word 2
    RNN step 3: h3 = GRU(h2, f3)  -> produces sentence/word 3

  Each RNN step: takes the previous hidden state + current image feature,
  outputs a vector that is decoded into a sentence describing that image.</div>

  </div>

<div class="card">
  <h3><span class="icon">🤖</span>Transformers vs RNN vs CNN</h3>
  <p>The professor said: <strong>understand what Transformers are used for and why they differ</strong>. The key mechanism is <strong>attention</strong>.</p>
  <div class="two-col" style="margin-top:8px">

      <h4>Why RNN Falls Short</h4>
      <ul>
        <li>Processes tokens <strong>sequentially</strong> — cannot parallelize</li>
        <li>Long-range dependencies are hard (information bottleneck in hidden state)</li>
        <li>Even LSTM struggles with very long sequences</li>
      </ul>
    </div>
    <div class="compare-card">
      <h4>Why Transformer Wins</h4>
      <ul>
        <li><strong>Self-attention</strong>: each token attends to ALL other tokens simultaneously</li>
        <li>Captures long-range dependencies directly</li>
        <li>Fully parallelizable — much faster to train</li>
        <li>Works on images too (Vision Transformer — attention on image patches)</li>
      </ul>

  Transformer: attends to ALL positions at once -> captures global context

Decoder: generates output token by token -> attends to encoder output (GPT: generation)
Encoder-Decoder: translation, summarization (T5, BART)</div>

  // ── PLANNING ─────────────────────────────────────────────────
  { id:"planning", navGroup:"Planning & RL", navLabel:"Planning (STRIPS)",

    title:"Planning",
    subtitle:"Blocks World, STRIPS, Sussman Anomaly, state-space vs plan-space (state→state vs action→action), heuristics",

    content:`
<div class="info-box exam">
  <div class="box-icon">⭐</div>
  <div><strong>Professor:</strong> Know the difference between planning and state-space search. State-space: state→state. Plan-space: action→action. Planning and BBN and Bayes Inference is normal exam coverage.</div>
</div>

<div class="two-col">
  <div class="card">
    <h3><span class="icon">🆚</span>Search vs Planning</h3>
    <p><strong>A* / search:</strong> state is an opaque blob; uses problem-specific heuristics; finds a sequence of states.</p>
    <p><strong>Planning:</strong> opens up the representation. States, goals, and actions are expressed formally (STRIPS/PDDL), enabling richer algorithms and automated heuristics.</p>
  </div>
  <div class="card">
    <h3><span class="icon">📦</span>STRIPS Action Representation</h3>
    <ul>
      <li><strong>Preconditions:</strong> facts that must be true to execute the action</li>
      <li><strong>Add list:</strong> facts made true by the action</li>
      <li><strong>Delete list:</strong> facts made false by the action</li>
    </ul>
    <div class="formula">Action: Stack(X, Y)
Pre:    Hold(X) AND Clear(Y)
Add:    On(X,Y), Clear(X), HandEmpty
Del:    Hold(X), Clear(Y)</div>
  </div>
</div>

<div class="card">
  <h3><span class="icon">🗺️</span>State-Space vs Plan-Space Planning</h3>
  <p>The professor's key distinction: <strong>state→state vs action→action</strong>.</p>
  <div class="two-col" style="margin-top:8px">
    <div class="compare-card">
      <h4>State-Space Planning (state→state)</h4>
      <ul>
        <li><strong>Nodes = world states</strong></li>
        <li><strong>Edges = actions</strong> (transitions between states)</li>
        <li>Forward search: apply actions from initial state</li>
        <li>Backward (regression): work back from goal</li>
        <li>STRIPS uses backward search</li>
        <li>Heuristics estimate distance from state to goal</li>
      </ul>
    </div>
    <div class="compare-card">
      <h4>Plan-Space Planning (action→action)</h4>
      <ul>
        <li><strong>Nodes = partial plans</strong> (sets of partially ordered actions)</li>
        <li><strong>Edges = plan refinements</strong> (add/order actions, resolve conflicts)</li>
        <li>Partial-Order Planner (POP) operates here</li>
        <li>Sound AND complete</li>
        <li>Can interleave steps for different subgoals</li>
      </ul>
    </div>
  </div>
</div>

<div class="card">
  <h3><span class="icon">🧱</span>Blocks World Domain</h3>
  <div class="two-col" style="margin-top:8px">
    <div class="compare-card">
      <h4>Predicates</h4>
      <ul>
        <li><strong>On(X,Y)</strong> — X directly on Y</li>
        <li><strong>OnTable(X)</strong> — X on the table</li>
        <li><strong>Clear(X)</strong> — nothing on top of X</li>
        <li><strong>Hold(X)</strong> — arm holding X</li>
        <li><strong>HandEmpty</strong> — arm free</li>
      </ul>
    </div>
    <div class="compare-card">
      <h4>Core Actions</h4>
      <ul>
        <li><strong>Pickup(X):</strong> Pre: Clear(X), OnTable(X), HandEmpty</li>
        <li><strong>Putdown(X):</strong> Pre: Hold(X)</li>
        <li><strong>Unstack(X,Y):</strong> Pre: On(X,Y), Clear(X), HandEmpty</li>
        <li><strong>Stack(X,Y):</strong> Pre: Hold(X), Clear(Y)</li>
      </ul>
    </div>
  </div>
</div>

<div class="card">
  <h3><span class="icon">⚠️</span>Sussman Anomaly &amp; STRIPS Limitations</h3>
  <div class="formula">Goal: On(A,B) AND On(B,C)
Initial: A on B, B on table, C on table

If STRIPS tackles goals one at a time:
  Fixing On(B,C): must move A off B first -> puts A on table -> then B on C
  Now On(A,B) is no longer satisfied!
  Planner must re-achieve On(A,B) -> may undo On(B,C)...

Result: needlessly long plan, or failure to find a solution.
STRIPS is SOUND but INCOMPLETE.</div>
</div>

<div class="card">
  <h3><span class="icon">🎯</span>State-Space Planning Heuristics</h3>
  <ul>
    <li><strong>Number of unsatisfied goals:</strong> count of goal conditions not yet true — simple but effective</li>
    <li><strong>Relaxed plan heuristic:</strong> solve a relaxed version (ignore delete lists); count steps — usually admissible</li>
    <li><strong>h_max:</strong> cost of the hardest single goal condition</li>
    <li><strong>h_add:</strong> sum of costs of all goal conditions (inadmissible but informative)</li>
  </ul>
</div>

<div class="example">
  <div class="example-header" onclick="toggleExample(this)">
    <div class="example-title"><span class="ex-badge">SUMMARY</span>State-Space vs Plan-Space Comparison Table</div>
    <div class="example-toggle">▼</div>
  </div>
  <div class="example-body">
    <div class="solution-label">Full comparison</div>
    <div class="solution-text">
      <table>
        <thead><tr><th>Property</th><th>State-Space (state→state)</th><th>Plan-Space (action→action)</th></tr></thead>
        <tbody>
          <tr><td>Nodes</td><td>World states</td><td>Partial plans</td></tr>
          <tr><td>Edges</td><td>Actions</td><td>Plan refinements</td></tr>
          <tr><td>Direction</td><td>Forward or backward</td><td>Both simultaneously</td></tr>
          <tr><td>Soundness</td><td>YES (STRIPS)</td><td>YES (POP)</td></tr>
          <tr><td>Completeness</td><td>NO (STRIPS)</td><td>YES (POP)</td></tr>
          <tr><td>Goal handling</td><td>Sequential (linear)</td><td>Interleaved</td></tr>
          <tr><td>Sussman Anomaly</td><td>Vulnerable</td><td>Avoids it</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>`
  },

  // ── REINFORCEMENT LEARNING ────────────────────────────────────
  { id:"rl", navGroup:"Planning & RL", navLabel:"Reinforcement Learning",
    tagText:"Chapter 17", tagCls:"tag-rl",
    title:"Reinforcement Learning",
    subtitle:"MDPs, Markov property, transition functions, rewards, objective, Bellman equation",
    quizId:"rl",
    content:`
<div class="card">
  <h3><span class="icon">🎮</span>Markov Decision Process (MDP)</h3>
  <div class="formula">MDP = (S, A, T, R, gamma)
  S:         set of states
  A:         set of actions
  T(s,a,s'): P(s' | s, a)   transition probability
  R(s, a):   reward function
  gamma:     discount factor in [0, 1]</div>
</div>

<div class="two-col">
  <div class="card">
    <h3><span class="icon">🔗</span>Markov Property</h3>
    <div class="formula">P(s_{t+1} | s0,a0,...,st,at)
   =  P(s_{t+1} | st, at)

Current state captures ALL relevant
history. Past is irrelevant given present.</div>
  </div>
  <div class="card">
    <h3><span class="icon">🎲</span>Deterministic vs Probabilistic</h3>
    <p><strong>Deterministic:</strong> T(s,a,s')=1 for exactly one s'. Same action → same outcome.</p>
    <p><strong>Probabilistic:</strong> T distributed across multiple s'. Σs' T(s,a,s')=1. Models uncertainty (robot slip, etc.).</p>
  </div>
</div>

<div class="card">
  <h3><span class="icon">💰</span>Objective Function &amp; Bellman Equation</h3>
  <div class="formula">Objective: find pi* maximizing  E[ SUM_{t=0}^inf  gamma^t * R(st, at) ]

Bellman equation (optimal value function):
  V*(s) = max_a [ R(s,a) + gamma * SUM_{s'} T(s,a,s') * V*(s') ]

Optimal policy:
  pi*(s) = argmax_a [ R(s,a) + gamma * SUM_{s'} T(s,a,s') * V*(s') ]</div>
  <div class="info-box note"><div class="box-icon">💡</div><div><strong>RL vs planning:</strong> classical planning is given T and R explicitly. RL agents learn them through interaction — observing (s, a, r, s') tuples from the environment.</div></div>
</div>`
  },

  // ── TRUE / FALSE DRILL ────────────────────────────────────────
  { id:"true-false-drill", navGroup:"Review", navLabel:"True / False Drill",

// ================================================================
// RENDERING ENGINE — only edit for layout/behaviour changes
// ================================================================
const scores = {};
Object.keys(QUIZ_DATA).forEach(k => { scores[k] = { correct:0, total:QUIZ_DATA[k].length }; });

function renderNav() {
  const nav = document.getElementById('app-nav');
  let html = '', currentGroup = '';
  TOPICS.forEach(t => {
    if (t.navGroup !== currentGroup) {
      currentGroup = t.navGroup;
      html += `<div class="nav-group-label">${currentGroup}</div>`;
    }
    html += `<div class="nav-item" id="nav-${t.id}" onclick="showTopic('${t.id}')">
               <div class="nav-dot"></div>${t.navLabel}</div>`;
  });
  nav.innerHTML = html;
}

function renderTopics() {
  const main = document.getElementById('app-main');
  main.innerHTML = TOPICS.map((t, i) => `
    <div class="topic${i===0?' active':''}" id="topic-${t.id}">
      <div class="topic-header">
        <div class="topic-tag ${t.tagCls}">${t.tagText}</div>
        <h2>${t.title}</h2>
        <p>${t.subtitle}</p>
      </div>
      ${t.content}
      <div class="quiz-container">
        <div class="quiz-header">Quick Quiz</div>
        <div class="quiz-sub">Click an option to check your answer instantly.</div>
        <div class="quiz-score-bar">
          <div>
            <div class="score-num" id="score-display-${t.quizId}">0 / ${QUIZ_DATA[t.quizId].length}</div>
            <div class="score-label">correct answers</div>
          </div>
          <button class="quiz-reset-btn" onclick="resetQuiz('${t.quizId}')">↺ Reset</button>
        </div>
        <div id="quiz-body-${t.quizId}"></div>
      </div>
    </div>`).join('');
}

function buildQuiz(quizId) {
  const container = document.getElementById('quiz-body-' + quizId);
  if (!container) return;
  const data = QUIZ_DATA[quizId];
  scores[quizId] = { correct:0, total:data.length };
  updateScoreDisplay(quizId);
  const letters = ['A','B','C','D','E'];
  container.innerHTML = data.map((item, qi) => `
    <div class="quiz-q" id="qq-${quizId}-${qi}">
      <div class="quiz-question">${qi+1}. ${item.q}</div>
      <div class="quiz-options">
        ${item.opts.map((opt,oi) =>
          `<div class="quiz-option" id="qo-${quizId}-${qi}-${oi}"
               onclick="handleAnswer('${quizId}',${qi},${oi})">
             <span class="opt-letter">${letters[oi]}</span>${opt}
           </div>`).join('')}
      </div>
      <div class="quiz-feedback" id="qf-${quizId}-${qi}"></div>
    </div>`).join('');
}

function handleAnswer(quizId, qi, selected) {
  const qDiv = document.getElementById(`qq-${quizId}-${qi}`);
  if (qDiv.dataset.done) return;
  qDiv.dataset.done = '1';
  const item = QUIZ_DATA[quizId][qi];
  const isCorrect = selected === item.ans;
  document.getElementById(`qo-${quizId}-${qi}-${selected}`)
    .classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
  if (!isCorrect)
    document.getElementById(`qo-${quizId}-${qi}-${item.ans}`).classList.add('reveal-correct');
  item.opts.forEach((_,oi) => {
    const el = document.getElementById(`qo-${quizId}-${qi}-${oi}`);
    el.style.cursor = 'default'; el.onclick = null;
  });
  const fb = document.getElementById(`qf-${quizId}-${qi}`);
  fb.textContent = (isCorrect ? '✓ Correct! ' : '✗ Incorrect. ') + item.exp;
  fb.className = 'quiz-feedback show ' + (isCorrect ? 'correct' : 'wrong');
  if (isCorrect) scores[quizId].correct++;
  updateScoreDisplay(quizId);
}

function updateScoreDisplay(quizId) {
  const el = document.getElementById('score-display-' + quizId);
  if (el) el.textContent = `${scores[quizId].correct} / ${scores[quizId].total}`;
}

function resetQuiz(quizId) { buildQuiz(quizId); }

function showTopic(id) {
  document.querySelectorAll('.topic').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('topic-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  const topic = TOPICS.find(t => t.id === id);
  if (topic) {
    const body = document.getElementById('quiz-body-' + topic.quizId);
    if (body && body.children.length === 0) buildQuiz(topic.quizId);
  }
}

function toggleExample(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function init() {
  renderNav(); renderTopics();
  document.querySelector('.nav-item').classList.add('active');
  buildQuiz(TOPICS[0].quizId);
}
init();
</script>
</body>
</html>
